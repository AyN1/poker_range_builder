<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Range Builder</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #2e2e2e;
    --panel: #3a3a3a;
    --empty-cell: #d9d9d9;
    --border: #1c1c1c;
    --accent: #7fc2ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px; background: var(--bg); color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .app { max-width: 820px; margin: 0 auto; }

  /* ---- Top bar (category dropdown + edit toggle + export/import) ---- */
  #topbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .nav-chip { position: relative; }
  .nav-chip > .chip-btn {
    background: var(--panel); color: #eee; border: 1px solid #555; border-radius: 6px;
    padding: 7px 12px; cursor: pointer; font-size: 13px; display: flex; gap: 8px; align-items: center;
  }
  .nav-chip > .chip-btn:hover { background: #474747; }
  .nav-chip.open > .chip-btn { border-color: var(--accent); }
  .chip-label { color: #8ba7bd; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .chip-val { font-weight: 600; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-caret { color: #8ba7bd; }
  .nav-spacer { flex: 1 1 auto; }
  .nav-btn {
    background: var(--panel); color: #eee; border: 1px solid #555; border-radius: 6px;
    padding: 7px 12px; cursor: pointer; font-size: 13px;
  }
  .nav-btn:hover { background: #474747; }
  .edit-toggle.on { background: #2f5233; border-color: #4a8a52; color: #dff0e0; }
  .edit-toggle.off { background: #3a3a3a; }

  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; z-index: 20; background: #333;
    border: 1px solid #555; border-radius: 8px; padding: 8px; min-width: 240px;
    max-height: 360px; overflow: auto; box-shadow: 0 6px 22px rgba(0,0,0,0.45);
  }
  .drop-head { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin: 2px 6px 6px; }
  .drop-add {
    display: block; width: 100%; margin-top: 6px; background: #2a2a2a; border: 1px dashed #666;
    color: #ccc; border-radius: 6px; padding: 7px; cursor: pointer; font-size: 12px;
  }
  .drop-add:hover { background: #2f2f2f; }

  /* editable rows inside the category dropdown */
  .side-row {
    display: flex; align-items: center; gap: 4px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; border: 1px solid transparent; margin-bottom: 2px;
  }
  .side-row:hover { background: #444; }
  .side-row.active { border-color: var(--accent); background: #40495a; }
  .side-row .side-name { flex: 1; min-width: 0; color: #eee; font-size: 13px; padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .side-row .side-edit { flex: 1; min-width: 0; background: #2a2a2a; border: 1px solid var(--accent); color: #eee; font-size: 13px; padding: 2px 4px; border-radius: 4px; }
  .side-row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .side-row .icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; line-height: 1; flex: none; padding: 2px 5px; opacity: 0; transition: opacity 0.12s; }
  .side-row:hover .icon-btn, .side-row:focus .icon-btn, .side-row:focus-within .icon-btn { opacity: 1; }
  .side-row .edit { color: #9fb0c4; } .side-row .edit:hover { color: #d5e3f2; }
  .side-row .remove { color: #d66; } .side-row .remove:hover { color: #f88; }

  /* ---- Axis tab rows (position / sizing / villain as pills) ---- */
  #axisBar { margin-bottom: 12px; }
  .axis-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .axis-row .axis-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8ba7bd; min-width: 66px; }
  .pill {
    background: var(--panel); color: #ccc; border: 1px solid #555; border-radius: 999px;
    padding: 5px 12px; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
  }
  .pill:hover { background: #474747; }
  .pill.active { background: #40495a; border-color: var(--accent); color: #fff; }
  .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .pill .pill-edit, .pill .pill-remove { background: none; border: none; cursor: pointer; font-size: 12px; padding: 0 1px; opacity: 0; line-height: 1; }
  .pill:hover .pill-edit, .pill:hover .pill-remove { opacity: 0.85; }
  .pill .pill-edit { color: #cfe0f2; } .pill .pill-remove { color: #f2b3b3; }
  .pill-add { border-style: dashed; color: #9ab0a0; }
  .pill-input { background: #2a2a2a; border: 1px solid var(--accent); color: #eee; border-radius: 999px; padding: 5px 10px; font-size: 13px; width: 130px; }

  /* ---- Board ---- */
  #boardTitle { text-align: center; font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; margin-bottom: 12px; }
  .empty-state { text-align: center; color: #999; padding: 60px 20px; background: var(--panel); border-radius: 8px; }

  .scenario-bar { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap; }
  .scn-lbl { color: #999; font-size: 12px; }
  .scn-seg { background: var(--panel); color: #ccc; border: 1px solid #555; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
  .scn-seg:hover { background: #474747; }
  .scn-seg.active { background: #40495a; border-color: var(--accent); color: #fff; }
  .scn-seg-edit { background: #2a2a2a; border: 1px solid var(--accent); color: #eee; border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 170px; }

  .hint { text-align: center; font-size: 12px; color: #999; margin-bottom: 14px; }
  .readonly-note { text-align: center; font-size: 12px; color: #7a9; margin-bottom: 14px; }

  #grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; background: var(--border); border: 2px solid var(--border); margin-bottom: 20px; user-select: none; }
  .cell { position: relative; aspect-ratio: 1; background: var(--empty-cell); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #333; overflow: hidden; }
  .cell.editable { cursor: pointer; }
  .cell.editable:hover { filter: brightness(1.08); }
  .cell .secondary { position: absolute; inset: 0; clip-path: polygon(100% 0, 100% 100%, 0 100%); }
  .cell .label { position: relative; z-index: 1; pointer-events: none; }
  .cell.outlined { box-shadow: inset 0 0 0 3px var(--outline-color, #fff); }

  /* ---- Actions panel ---- */
  #actionsPanel { background: var(--panel); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
  #actionsPanel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin: 2px 6px 10px; }
  .action-row { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 6px; border: 1px solid transparent; }
  .action-row.pickable { cursor: pointer; }
  .action-row.pickable:hover { background: #444; }
  .action-row.active { border-color: var(--accent); background: #40495a; }
  .action-row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .action-row .swatch { width: 26px; height: 20px; border-radius: 4px; border: 1px solid #666; flex: none; }
  .action-row .action-label { flex: 1; font-size: 13px; }
  .action-row .percent { width: 64px; text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; color: #ccc; flex: none; }

  #fileInput { display: none; }

  /* ---- Drill mode ---- */
  #drillRoot { position: fixed; inset: 0; z-index: 100; background: #262626; display: none; overflow: auto; }
  #drillRoot.on { display: block; }
  .drill-wrap { max-width: 720px; margin: 0 auto; padding: 18px 16px 60px; }
  .drill-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .drill-top .d-title { font-weight: 700; font-size: 16px; }
  .drill-top .d-spacer { flex: 1; }
  .d-progress { font-size: 13px; color: #9ab; font-variant-numeric: tabular-nums; }
  .drill-close { background: #3a3a3a; border: 1px solid #555; color: #eee; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  .drill-close:hover { background: #474747; }

  .d-card { background: #333; border: 1px solid #4a4a4a; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .d-card h3 { margin: 0 0 6px; font-size: 15px; }
  .d-card p { margin: 0 0 14px; color: #aaa; font-size: 13px; line-height: 1.4; }
  .d-scope { display: grid; gap: 8px; }
  .d-scope-btn { text-align: left; background: #2c2c2c; border: 1px solid #555; border-radius: 8px; padding: 12px 14px; cursor: pointer; color: #eee; display: flex; align-items: center; gap: 12px; }
  .d-scope-btn:hover:not(:disabled) { border-color: var(--accent); background: #333b46; }
  .d-scope-btn.sel { border-color: var(--accent); background: #37414f; }
  .d-scope-btn:disabled { cursor: default; }
  .d-scope-namerow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .d-scope-name { font-weight: 600; font-size: 14px; }
  .d-scope-badge { font-size: 11px; font-weight: 600; color: #d4e6ab; background: #33421f; border: 1px solid #5c7a3d; border-radius: 999px; padding: 1px 8px; white-space: nowrap; }
  .d-scope-sub { color: #9aa; font-size: 12px; margin-top: 2px; }
  .d-scope-tip { color: #86a98f; font-size: 12px; margin-top: 5px; line-height: 1.35; }
  .d-scope-count { margin-left: auto; color: #9ab; font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .d-start { display: block; width: 100%; margin-top: 14px; background: #2f5233; border: 1px solid #4a8a52; color: #dff0e0; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .d-start:hover { background: #366039; }
  .d-mini-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .d-mini-actions button { background: #2c2c2c; border: 1px solid #555; color: #ccc; border-radius: 6px; padding: 7px 11px; cursor: pointer; font-size: 12px; }
  .d-mini-actions button:hover { background: #333; }

  .d-context { text-align: center; color: #9ab; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .d-hand { text-align: center; font-size: 60px; font-weight: 800; letter-spacing: 1px; margin: 4px 0; color: #fff; }
  .d-hand-sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 18px; }
  .d-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .d-ans { display: flex; align-items: center; gap: 10px; background: #2f2f2f; border: 2px solid #555; border-radius: 9px; padding: 12px 14px; cursor: pointer; color: #eee; font-size: 14px; font-weight: 600; text-align: left; }
  .d-ans:hover:not(:disabled) { border-color: var(--accent); }
  .d-ans .d-sw { width: 22px; height: 22px; border-radius: 5px; border: 1px solid #666; flex: none; }
  .d-kbd { margin-left: auto; color: #888; font-size: 12px; font-variant-numeric: tabular-nums; }
  .d-ans:disabled { cursor: default; }
  .d-ans.correct { border-color: #58c26a; background: #2c4230; }
  .d-ans.chosen-wrong { border-color: #d9603b; background: #43302c; }
  .d-ans.dim { opacity: 0.4; }

  .d-feedback { border-radius: 9px; padding: 13px 15px; margin-bottom: 14px; font-size: 14px; line-height: 1.4; }
  .d-feedback.exact { background: #223a27; border: 1px solid #58c26a; }
  .d-feedback.near { background: #383c26; border: 1px solid #b9c24a; }
  .d-feedback.borderline { background: #3d3623; border: 1px solid #d0a53b; }
  .d-feedback.far { background: #3d2a26; border: 1px solid #d9603b; }
  .d-next { display: block; width: 100%; background: #37414f; border: 1px solid var(--accent); color: #eaf2fb; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .d-next:hover { background: #3f4c5e; }

  .d-mini-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); max-width: 320px; margin: 0 auto 16px; }
  .d-mini-cell { position: relative; aspect-ratio: 1; background: var(--empty-cell); overflow: hidden; }
  .d-mini-cell .d-mini-sec { position: absolute; inset: 0; clip-path: polygon(100% 0, 100% 100%, 0 100%); }
  .d-mini-cell.hl { outline: 3px solid #fff; outline-offset: -1px; z-index: 2; }

  .d-sum-stat { display: flex; justify-content: space-between; padding: 8px 2px; border-bottom: 1px solid #444; font-size: 14px; }
  .d-sum-stat:last-child { border-bottom: none; }
  .d-sum-stat .v { font-weight: 700; font-variant-numeric: tabular-nums; }
  .d-missed { display: flex; flex-wrap: wrap; gap: 6px; }
  .d-missed .chip { background: #3d2a26; border: 1px solid #7a4a3a; border-radius: 5px; padding: 3px 8px; font-size: 12px; font-variant-numeric: tabular-nums; }

  @media (max-width: 520px) {
    .d-hand { font-size: 46px; }
    .d-answers { grid-template-columns: 1fr; }
  }

  /* ---- Preflop logger ---- */
  #logRoot { position: fixed; inset: 0; z-index: 100; background: #262626; display: none; overflow: auto; }
  #logRoot.on { display: block; }
  .lg-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .lg-tab { flex: 1; background: #333; border: 1px solid #555; color: #ccc; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .lg-tab.active { background: #40495a; border-color: var(--accent); color: #fff; }
  .lg-sec { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8ba7bd; margin: 12px 2px 6px; }
  .lg-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .lg-chip { background: #2f2f2f; border: 1px solid #555; color: #ccc; border-radius: 999px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
  .lg-chip.sel { background: #40495a; border-color: var(--accent); color: #fff; }
  .lg-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); max-width: 480px; margin: 6px auto; }
  .lg-cell { aspect-ratio: 1; background: #3c3c3c; color: #9a9a9a; font-size: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; border: none; }
  .lg-cell.pair { background: #464646; }
  .lg-cell.sel { outline: 3px solid var(--accent); outline-offset: -2px; color: #fff; background: #40495a; z-index: 2; }
  .d-ans.sel { border-color: var(--accent); background: #37414f; }
  .lg-save { display: block; width: 100%; margin-top: 12px; background: #2f5233; border: 1px solid #4a8a52; color: #dff0e0; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; position: sticky; bottom: 8px; }
  .lg-save:disabled { opacity: 0.4; cursor: default; position: static; }
  .lg-reveal { display: block; margin: 8px auto 0; background: #2c2c2c; border: 1px solid #555; color: #ccc; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
  .lg-day { margin: 16px 0 4px; color: #8ba7bd; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .lg-entry { display: flex; align-items: center; gap: 8px; padding: 8px 4px; border-bottom: 1px solid #3d3d3d; font-size: 13px; }
  .lg-entry .lg-hand { font-weight: 700; min-width: 34px; }
  .lg-entry .lg-info { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lg-meta { color: #888; }
  .lg-badge { border-radius: 5px; padding: 2px 7px; font-size: 11px; font-weight: 700; flex: none; }
  .lg-badge.exact { background: #2c4230; color: #8fd49c; }
  .lg-badge.near { background: #3c4028; color: #cfd06a; }
  .lg-badge.borderline { background: #43391f; color: #e0b45a; }
  .lg-badge.far { background: #43302c; color: #e08a6a; }
  .lg-badge.none { background: #3a3a3a; color: #999; }
  .lg-del { background: none; border: none; color: #d66; cursor: pointer; font-size: 15px; flex: none; padding: 2px 6px; }
</style>
</head>
<body>
<div class="app">
  <div id="topbar"></div>
  <div id="axisBar"></div>
  <div id="boardArea"></div>
  <div id="actionsPanel"></div>
  <input id="fileInput" type="file" accept="application/json,.json">
</div>
<div id="drillRoot"></div>
<div id="logRoot"></div>

<script>
(function () {
  "use strict";

  const RANKS = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
  const STORAGE_KEY = "pokerRangeBuilder:library";

  // Fixed action sets per category type. Each fill action carries a "family" and an aggression
  // "rank" used by the scenario engine (§ classifySplit). Outline actions (6BB) have neither.
  const ACTION_SETS = {
    attaque: [
      { id: "att_open_fold", label: "Open / Fold vs 3bet", color: "#6b83b0", style: "fill", family: "open", rank: 0 },
      { id: "att_open_call", label: "Open / Call vs 3bet", color: "#5c7a3d", style: "fill", family: "open", rank: 1 },
      { id: "att_4bet_fold", label: "4bet / fold vs 5bet", color: "#7a4fa0", style: "fill", family: "open", rank: 2 },
      { id: "att_4bet_call", label: "4bet / call vs 5bet", color: "#d9603b", style: "fill", family: "open", rank: 3 },
      { id: "att_limp_call", label: "LIMP / CALL",         color: "#7fc242", style: "fill", family: "limp", rank: 1 },
      { id: "att_limp_fold", label: "LIMP / FOLD",         color: "#8fe0e8", style: "fill", family: "limp", rank: 0 },
      { id: "att_6bb",       label: "6BB",                 color: "#ffffff", style: "outline" },
      { id: "att_limp_rr",   label: "LIMP / RERAISE",      color: "#e07fd9", style: "fill", family: "limp", rank: 2 }
    ],
    defense: [
      { id: "def_call",        label: "CALL",                color: "#5c7a3d", style: "fill", family: "def", rank: 0 },
      { id: "def_raise_call4", label: "RAISE / CALL 4BET",   color: "#e0a53b", style: "fill", family: "def", rank: 2 },
      { id: "def_5bet_allin",  label: "RAISE / 5BET ALL IN", color: "#d9603b", style: "fill", family: "def", rank: 3 },
      { id: "def_raise_fold4", label: "RAISE / FOLD 4BET",   color: "#a986c9", style: "fill", family: "def", rank: 1 }
    ]
  };
  const ACTION_BY_ID = {};
  [].concat(ACTION_SETS.attaque, ACTION_SETS.defense).forEach(a => { ACTION_BY_ID[a.id] = a; });
  function actionById(id) { return ACTION_BY_ID[id] || null; }
  function actionsFor(cat) { return (cat && ACTION_SETS[cat.type]) || ACTION_SETS.attaque; }

  // Scenario axes: a split cell's two actions determine which axis it belongs to.
  //  - same family (open/open, limp/limp, def/def) -> "tightness" (how tight is the raiser)
  //  - open vs limp                                -> "iso" (isolate/open vs overlimp)
  const SCENARIO_AXES = {
    tightness: { passive: "Relanceur serré", aggressive: "Relanceur large" },
    iso:       { passive: "Overlimp (table qui call)", aggressive: "Iso / open (bluff)" }
  };
  function classifySplit(id1, id2) {
    const a = actionById(id1), b = actionById(id2);
    if (!a || !b || a.family == null || b.family == null) return null;
    if (a.family === b.family) {
      if (a.rank === b.rank) return null;
      const passive = a.rank < b.rank ? a : b, aggressive = a.rank < b.rank ? b : a;
      return { axis: "tightness", passiveId: passive.id, aggressiveId: aggressive.id };
    }
    const fams = [a.family, b.family];
    if (fams.indexOf("open") >= 0 && fams.indexOf("limp") >= 0) {
      const openA = a.family === "open" ? a : b, limpA = a.family === "open" ? b : a;
      return { axis: "iso", passiveId: limpA.id, aggressiveId: openA.id };
    }
    const p = a.rank < b.rank ? a : b, ag = a.rank < b.rank ? b : a;
    return { axis: "tightness", passiveId: p.id, aggressiveId: ag.id };
  }
  function defaultScenarioLabels() {
    return {
      tightness: { passive: SCENARIO_AXES.tightness.passive, aggressive: SCENARIO_AXES.tightness.aggressive },
      iso: { passive: SCENARIO_AXES.iso.passive, aggressive: SCENARIO_AXES.iso.aggressive }
    };
  }

  const DEFENSE_AXES = [
    { key: "sizing",  label: "Sizing",    values: ["vs 3bb", "vs 6bb"] },
    { key: "villain", label: "Villain %", values: ["vs 10%", "vs 20%", "vs 40%"] }
  ];
  function axesFor(cat) {
    if (cat && cat.type === "defense") return DEFENSE_AXES;
    return [{ key: "position", label: "Position", values: null }];
  }

  const DEFAULT_CATEGORIES = [
    "Range Théorique RFI (raise first in)",
    "Range attaque sur Table Passive",
    "Range attaque sur Table Aggro",
    "Défense en position libre (btn/co...)",
    "Défense en SB",
    "Défense en BB",
    "RFI en Blinds"
  ];
  function guessType(name) { return /fense/i.test(name || "") ? "defense" : "attaque"; }
  function fixMojibake(s) {
    if (typeof s !== "string" || !/[ÃÂ]/.test(s)) return s;
    try { return decodeURIComponent(escape(s)); } catch (e) { return s; }
  }

  const HANDS = [];
  for (let i = 0; i < 13; i++) {
    for (let j = 0; j < 13; j++) {
      let key, weight;
      if (i === j) { key = RANKS[i] + RANKS[i]; weight = 6; }
      else if (i < j) { key = RANKS[i] + RANKS[j] + "s"; weight = 4; }
      else { key = RANKS[j] + RANKS[i] + "o"; weight = 12; }
      HANDS.push({ key: key, row: i, col: j, weight: weight });
    }
  }
  const TOTAL_COMBOS = 1326;

  function uid(prefix) { return prefix + Math.random().toString(36).slice(2, 9); }

  // ---- Migration (v2 -> v3) ----
  function buildActionRemap(oldActions) {
    const remap = {};
    const all = [].concat(ACTION_SETS.attaque, ACTION_SETS.defense);
    const norm = s => (s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
    (oldActions || []).forEach(oa => {
      const byLabel = all.find(na => norm(na.label) === norm(oa.label));
      const byColor = all.find(na => na.color.toLowerCase() === (oa.color || "").toLowerCase());
      const target = byLabel || byColor;
      if (target) remap[oa.id] = target.id;
    });
    return remap;
  }
  function remapCells(cells, remap, set) {
    const setIds = {}; set.forEach(a => { setIds[a.id] = true; });
    const out = {};
    Object.keys(cells || {}).forEach(k => {
      const c = cells[k], nc = {};
      if (c.fill && remap[c.fill] && setIds[remap[c.fill]]) nc.fill = remap[c.fill];
      if (c.fillSecondary && remap[c.fillSecondary] && setIds[remap[c.fillSecondary]]) nc.fillSecondary = remap[c.fillSecondary];
      if (c.outline && remap[c.outline] && setIds[remap[c.outline]]) nc.outline = remap[c.outline];
      if (Object.keys(nc).length) out[k] = nc;
    });
    return out;
  }
  function migrateToV3(old) {
    const remap = buildActionRemap(old.actions);
    const categories = (old.categories || []).map(cat => {
      const name = fixMojibake(cat.name);
      const type = cat.type || guessType(name);
      const set = ACTION_SETS[type] || ACTION_SETS.attaque;
      const ranges = (cat.positions || []).map(pos => ({
        id: pos.id || uid("r"), coords: { position: fixMojibake(pos.name) }, cells: remapCells(pos.cells, remap, set)
      }));
      return { id: cat.id || uid("c"), name: name, type: type, ranges: ranges };
    });
    return { version: 3, scenarioLabels: defaultScenarioLabels(), categories: categories };
  }
  function normalizeLibrary(parsed) {
    if (!parsed || !Array.isArray(parsed.categories)) return null;
    if (parsed.version >= 3 && !parsed.actions) {
      if (!parsed.scenarioLabels || !parsed.scenarioLabels.tightness) parsed.scenarioLabels = defaultScenarioLabels();
      parsed.categories.forEach(c => {
        c.name = fixMojibake(c.name);
        if (!c.type) c.type = guessType(c.name);
        if (!Array.isArray(c.ranges)) c.ranges = [];
        c.ranges.forEach(r => { if (r.coords && r.coords.position) r.coords.position = fixMojibake(r.coords.position); });
      });
      return parsed;
    }
    return migrateToV3(parsed);
  }

  function defaultLibrary() {
    return {
      version: 3, scenarioLabels: defaultScenarioLabels(),
      categories: DEFAULT_CATEGORIES.map(name => ({ id: uid("c"), name: name, type: guessType(name), ranges: [] }))
    };
  }
  function loadLibrary() {
    try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return null; return normalizeLibrary(JSON.parse(raw)); }
    catch (e) { return null; }
  }
  function saveLibrary() { localStorage.setItem(STORAGE_KEY, JSON.stringify(library)); }

  // ---- State ----
  let library = loadLibrary() || defaultLibrary();
  let selectedCategoryId = null;
  let selectedRangeId = null;
  let activeActionId = null;
  let scenarioState = { tightness: "both", iso: "both" }; // per-axis: "both" | "passive" | "aggressive"
  let editMode = true;
  let openDropdown = null; // "category" | null

  function selectedCategory() { return library.categories.find(c => c.id === selectedCategoryId) || null; }
  function currentRange() {
    const cat = selectedCategory();
    if (!cat) return null;
    return cat.ranges.find(r => r.id === selectedRangeId) || null;
  }
  function coordsMatch(cat, coords) { return cat.ranges.find(r => axesFor(cat).every(a => r.coords[a.key] === coords[a.key])) || null; }
  function findOrCreateRange(cat, coords) {
    let r = coordsMatch(cat, coords);
    if (!r) { r = { id: uid("r"), coords: Object.assign({}, coords), cells: {} }; cat.ranges.push(r); }
    return r;
  }
  function initSelection() {
    const withRanges = library.categories.find(c => c.ranges && c.ranges.length);
    const first = withRanges || library.categories[0] || null;
    selectedCategoryId = first ? first.id : null;
    applyCategoryDefaults();
  }
  function applyCategoryDefaults() {
    const cat = selectedCategory();
    if (!cat) { selectedRangeId = null; activeActionId = null; return; }
    const acts = actionsFor(cat);
    activeActionId = acts.length ? acts[0].id : null;
    if (cat.type === "defense") {
      selectedRangeId = findOrCreateRange(cat, { sizing: DEFENSE_AXES[0].values[0], villain: DEFENSE_AXES[1].values[0] }).id;
    } else {
      selectedRangeId = cat.ranges[0] ? cat.ranges[0].id : null;
    }
  }

  // ---- Scenario resolution ----
  // Given a stored cell, return the fill/secondary to DISPLAY under the current scenario state.
  // A split collapses to one side when its axis is toggled (resolved by classifySplit, so the
  // stored fill/secondary order is irrelevant to correctness). In "both" view we keep the order
  // exactly as painted — this matches the training screenshots and needs no data normalization.
  function resolveCellDisplay(cell) {
    let fillId = cell.fill || null, secId = cell.fillSecondary || null;
    if (fillId && secId) {
      const cls = classifySplit(fillId, secId);
      if (cls) {
        const st = scenarioState[cls.axis] || "both";
        if (st === "passive") { fillId = cls.passiveId; secId = null; }
        else if (st === "aggressive") { fillId = cls.aggressiveId; secId = null; }
        // "both": leave fillId/secId as stored (painted orientation preserved)
      }
    }
    return { fillId: fillId, secId: secId };
  }
  // Which scenario axes actually appear among the current cells' splits.
  function activeAxes(cells) {
    const set = {};
    HANDS.forEach(h => {
      const c = cells[h.key];
      if (c && c.fill && c.fillSecondary) {
        const cls = classifySplit(c.fill, c.fillSecondary);
        if (cls) set[cls.axis] = true;
      }
    });
    return Object.keys(set);
  }

  function computePercents(cells, actions) {
    const totals = {}; actions.forEach(a => { totals[a.id] = 0; });
    const add = (id, w) => { if (id && totals.hasOwnProperty(id)) totals[id] += w; };
    HANDS.forEach(h => {
      const cell = cells[h.key]; if (!cell) return;
      const d = resolveCellDisplay(cell);
      if (d.fillId && d.secId) { add(d.fillId, h.weight / 2); add(d.secId, h.weight / 2); }
      else if (d.fillId) add(d.fillId, h.weight);
      else if (d.secId) add(d.secId, h.weight / 2);
      add(cell.outline, h.weight);
    });
    const out = {}; Object.keys(totals).forEach(id => { out[id] = totals[id] / TOTAL_COMBOS * 100; });
    return out;
  }

  // ---- DOM refs ----
  const topbarEl = document.getElementById("topbar");
  const axisBarEl = document.getElementById("axisBar");
  const boardAreaEl = document.getElementById("boardArea");
  const actionsPanelEl = document.getElementById("actionsPanel");
  const fileInput = document.getElementById("fileInput");

  function render() {
    renderTopbar();
    renderAxisBar();
    renderBoard();
    renderActionsPanel();
    saveLibrary();
  }

  // ---- Editable row (category dropdown) ----
  function buildRow(opts) {
    const row = document.createElement("div");
    row.className = "side-row" + (opts.active ? " active" : "");
    row.tabIndex = 0; row.setAttribute("role", "button"); row.setAttribute("aria-label", opts.name);
    if (opts.active) row.setAttribute("aria-current", "true");
    let editing = false;
    const nameSpan = document.createElement("span"); nameSpan.className = "side-name"; nameSpan.textContent = opts.name;
    const editBtn = document.createElement("button"); editBtn.type = "button"; editBtn.className = "icon-btn edit"; editBtn.tabIndex = -1; editBtn.textContent = "✎"; editBtn.title = opts.editTitle;
    const removeBtn = document.createElement("button"); removeBtn.type = "button"; removeBtn.className = "icon-btn remove"; removeBtn.tabIndex = -1; removeBtn.textContent = "×"; removeBtn.title = opts.removeTitle;
    function enterEdit() {
      if (editing) return; editing = true;
      const input = document.createElement("input"); input.type = "text"; input.className = "side-edit"; input.value = opts.name;
      editBtn.style.display = "none"; removeBtn.style.display = "none";
      row.replaceChild(input, nameSpan); input.focus(); input.select();
      let done = false;
      function finish(save) { if (done) return; done = true; if (save) opts.onRename(input.value.trim() || opts.name); else render(); }
      input.addEventListener("keydown", e => { e.stopPropagation(); if (e.key === "Enter") { e.preventDefault(); finish(true); } else if (e.key === "Escape") { e.preventDefault(); finish(false); } });
      input.addEventListener("blur", () => finish(true));
      input.addEventListener("click", e => e.stopPropagation());
    }
    row.addEventListener("click", () => { if (!editing) opts.onSelect(); });
    row.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); opts.onSelect(); }
      else if (e.key === "F2") { e.preventDefault(); enterEdit(); }
      else if (e.key === "Delete" || e.key === "Backspace") { e.preventDefault(); opts.onRemove(); }
    });
    editBtn.addEventListener("click", e => { e.stopPropagation(); enterEdit(); });
    removeBtn.addEventListener("click", e => { e.stopPropagation(); opts.onRemove(); });
    row.appendChild(nameSpan); row.appendChild(editBtn); row.appendChild(removeBtn);
    return row;
  }

  // ---- Top bar ----
  function renderTopbar() {
    topbarEl.innerHTML = "";
    const cat = selectedCategory();

    // Category dropdown chip
    const wrap = document.createElement("div");
    wrap.className = "nav-chip" + (openDropdown === "category" ? " open" : "");
    const btn = document.createElement("button"); btn.type = "button"; btn.className = "chip-btn";
    const l = document.createElement("span"); l.className = "chip-label"; l.textContent = "Catégorie";
    const v = document.createElement("span"); v.className = "chip-val"; v.textContent = cat ? cat.name : "—";
    const car = document.createElement("span"); car.className = "chip-caret"; car.textContent = "▾";
    btn.appendChild(l); btn.appendChild(v); btn.appendChild(car);
    btn.addEventListener("click", e => { e.stopPropagation(); openDropdown = openDropdown === "category" ? null : "category"; renderTopbar(); });
    wrap.appendChild(btn);
    if (openDropdown === "category") {
      const pop = document.createElement("div"); pop.className = "dropdown"; pop.addEventListener("click", e => e.stopPropagation());
      const head = document.createElement("div"); head.className = "drop-head"; head.textContent = "Catégories"; pop.appendChild(head);
      library.categories.forEach(c => {
        pop.appendChild(buildRow({
          name: c.name, active: c.id === selectedCategoryId,
          editTitle: "Renommer cette catégorie", removeTitle: "Supprimer cette catégorie",
          onSelect() { selectCategory(c.id); },
          onRename(n) { c.name = n; render(); },
          onRemove() {
            if (!confirm('Supprimer la catégorie "' + c.name + '" et toutes ses ranges ?')) return;
            library.categories = library.categories.filter(x => x.id !== c.id);
            if (selectedCategoryId === c.id) { selectedCategoryId = library.categories[0] ? library.categories[0].id : null; applyCategoryDefaults(); }
            openDropdown = null; render();
          }
        }));
      });
      const addA = document.createElement("button"); addA.className = "drop-add"; addA.textContent = "＋ Catégorie d'attaque"; addA.addEventListener("click", () => addCategory("attaque"));
      const addD = document.createElement("button"); addD.className = "drop-add"; addD.textContent = "＋ Catégorie de défense"; addD.addEventListener("click", () => addCategory("defense"));
      pop.appendChild(addA); pop.appendChild(addD);
      wrap.appendChild(pop);
    }
    topbarEl.appendChild(wrap);

    const spacer = document.createElement("span"); spacer.className = "nav-spacer"; topbarEl.appendChild(spacer);

    const editBtn2 = document.createElement("button");
    editBtn2.className = "nav-btn edit-toggle " + (editMode ? "on" : "off");
    editBtn2.textContent = editMode ? "✏️ Édition" : "👁 Lecture";
    editBtn2.title = "Basculer édition / lecture seule";
    editBtn2.addEventListener("click", () => { editMode = !editMode; render(); });
    topbarEl.appendChild(editBtn2);

    const drillBtn = document.createElement("button"); drillBtn.className = "nav-btn"; drillBtn.textContent = "🎯 Drill"; drillBtn.title = "Mode entraînement"; drillBtn.addEventListener("click", openDrill);
    topbarEl.appendChild(drillBtn);

    const logBtn = document.createElement("button"); logBtn.className = "nav-btn"; logBtn.textContent = "📓 Log"; logBtn.title = "Logger une action preflop jouée à table"; logBtn.addEventListener("click", openLog);
    topbarEl.appendChild(logBtn);

    const exportBtn = document.createElement("button"); exportBtn.className = "nav-btn"; exportBtn.textContent = "Exporter"; exportBtn.addEventListener("click", exportLibrary);
    const importBtn = document.createElement("button"); importBtn.className = "nav-btn"; importBtn.textContent = "Importer"; importBtn.addEventListener("click", () => fileInput.click());
    topbarEl.appendChild(exportBtn); topbarEl.appendChild(importBtn);
  }

  // ---- Axis bar (pills) ----
  function renderAxisBar() {
    axisBarEl.innerHTML = "";
    const cat = selectedCategory();
    if (!cat) return;
    axesFor(cat).forEach(axis => {
      const rowEl = document.createElement("div"); rowEl.className = "axis-row";
      const lab = document.createElement("span"); lab.className = "axis-label"; lab.textContent = axis.label; rowEl.appendChild(lab);
      if (axis.key === "position") {
        cat.ranges.forEach(r => rowEl.appendChild(buildPositionPill(cat, r)));
        const add = document.createElement("button"); add.className = "pill pill-add"; add.textContent = "＋"; add.title = "Ajouter une position";
        add.addEventListener("click", addPosition); rowEl.appendChild(add);
      } else {
        const cur = currentRange();
        const curVal = cur ? cur.coords[axis.key] : null;
        axis.values.forEach(val => {
          const p = document.createElement("button"); p.className = "pill" + (val === curVal ? " active" : ""); p.textContent = val;
          p.addEventListener("click", () => selectAxisValue(axis.key, val));
          rowEl.appendChild(p);
        });
      }
      axisBarEl.appendChild(rowEl);
    });
  }

  function buildPositionPill(cat, r) {
    const active = r.id === selectedRangeId;
    const p = document.createElement("span"); p.className = "pill" + (active ? " active" : ""); p.tabIndex = 0; p.setAttribute("role", "button");
    let editing = false;
    const name = document.createElement("span"); name.textContent = r.coords.position;
    const edit = document.createElement("button"); edit.className = "pill-edit"; edit.textContent = "✎"; edit.title = "Renommer"; edit.tabIndex = -1;
    const rem = document.createElement("button"); rem.className = "pill-remove"; rem.textContent = "×"; rem.title = "Supprimer"; rem.tabIndex = -1;
    function enterEdit() {
      if (editing) return; editing = true;
      const input = document.createElement("input"); input.className = "pill-input"; input.value = r.coords.position;
      p.replaceWith(input); input.focus(); input.select();
      let done = false;
      function finish(save) { if (done) return; done = true; if (save) r.coords.position = input.value.trim() || r.coords.position; render(); }
      input.addEventListener("keydown", e => { e.stopPropagation(); if (e.key === "Enter") { e.preventDefault(); finish(true); } else if (e.key === "Escape") { e.preventDefault(); finish(false); } });
      input.addEventListener("blur", () => finish(true));
    }
    p.addEventListener("click", () => { if (!editing) { selectedRangeId = r.id; render(); } });
    p.addEventListener("dblclick", e => { e.preventDefault(); enterEdit(); });
    p.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectedRangeId = r.id; render(); }
      else if (e.key === "F2") { e.preventDefault(); enterEdit(); }
    });
    edit.addEventListener("click", e => { e.stopPropagation(); enterEdit(); });
    rem.addEventListener("click", e => {
      e.stopPropagation();
      if (!confirm('Supprimer la position "' + r.coords.position + '" ?')) return;
      cat.ranges = cat.ranges.filter(x => x.id !== r.id);
      if (selectedRangeId === r.id) selectedRangeId = cat.ranges[0] ? cat.ranges[0].id : null;
      render();
    });
    p.appendChild(name); p.appendChild(edit); p.appendChild(rem);
    return p;
  }

  function selectCategory(id) { selectedCategoryId = id; applyCategoryDefaults(); openDropdown = null; render(); }
  function selectAxisValue(key, val) {
    const cat = selectedCategory(); const cur = currentRange();
    const coords = Object.assign({}, cur ? cur.coords : {}); coords[key] = val;
    axesFor(cat).forEach(a => { if (!coords[a.key]) coords[a.key] = a.values[0]; });
    selectedRangeId = findOrCreateRange(cat, coords).id; render();
  }
  function addCategory(type) {
    const cat = { id: uid("c"), name: type === "defense" ? "Nouvelle défense" : "Nouvelle catégorie", type: type, ranges: [] };
    library.categories.push(cat); selectCategory(cat.id);
  }
  function addPosition() {
    const cat = selectedCategory(); if (!cat || cat.type !== "attaque") return;
    const r = { id: uid("r"), coords: { position: "Nouvelle position" }, cells: {} };
    cat.ranges.push(r); selectedRangeId = r.id; render();
  }
  document.addEventListener("click", () => { if (openDropdown !== null) { openDropdown = null; renderTopbar(); } });

  // ---- Board ----
  function boardTitle(cat, range) {
    if (!range) return cat.name;
    const coordsTxt = axesFor(cat).map(a => range.coords[a.key]).filter(Boolean).join(" ");
    return cat.name + " — " + coordsTxt;
  }
  function renderBoard() {
    boardAreaEl.innerHTML = "";
    const cat = selectedCategory();
    if (!cat) { emptyState("Choisis ou crée une catégorie."); return; }
    if (cat.type === "attaque" && !currentRange() && cat.ranges[0]) selectedRangeId = cat.ranges[0].id;
    const range = currentRange();
    if (cat.type === "attaque" && !range) {
      const t = document.createElement("div"); t.id = "boardTitle"; t.textContent = cat.name; boardAreaEl.appendChild(t);
      emptyState("Aucune position. Ajoute-en une avec le bouton ＋ ci-dessus.");
      return;
    }
    const title = document.createElement("div"); title.id = "boardTitle"; title.textContent = boardTitle(cat, range); boardAreaEl.appendChild(title);

    const cells = range ? range.cells : {};
    renderScenarioBars(cells);

    if (editMode) {
      const hint = document.createElement("div"); hint.className = "hint";
      hint.textContent = "Clic = couleur pleine · Shift+clic = triangle bas-droit (split) · Alt/Option+clic = contour";
      boardAreaEl.appendChild(hint);
    } else {
      const note = document.createElement("div"); note.className = "readonly-note"; note.textContent = "👁 Lecture seule — active « Édition » pour modifier."; boardAreaEl.appendChild(note);
    }

    const grid = document.createElement("div"); grid.id = "grid";
    HANDS.forEach(h => {
      const cd = cells[h.key] || {};
      const div = document.createElement("div"); div.className = "cell" + (editMode ? " editable" : ""); div.dataset.key = h.key;
      paintCell(div, cd);
      const label = document.createElement("span"); label.className = "label"; label.textContent = h.key; div.appendChild(label);
      if (editMode) div.addEventListener("click", e => onCellClick(e, h.key));
      grid.appendChild(div);
    });
    boardAreaEl.appendChild(grid);
  }
  function emptyState(msg) { const e = document.createElement("div"); e.className = "empty-state"; e.textContent = msg; boardAreaEl.appendChild(e); }

  function paintCell(div, cd) {
    const d = resolveCellDisplay(cd);
    const fillA = d.fillId ? actionById(d.fillId) : null;
    div.style.background = fillA ? fillA.color : "";
    if (d.secId) {
      const s = actionById(d.secId);
      if (s) { const tri = document.createElement("div"); tri.className = "secondary"; tri.style.background = s.color; div.appendChild(tri); }
    }
    if (cd.outline) {
      const o = actionById(cd.outline);
      if (o) { div.classList.add("outlined"); div.style.setProperty("--outline-color", o.color); }
    }
  }

  function onCellClick(e, key) {
    const cat = selectedCategory(); const range = currentRange();
    if (!cat || !range || !activeActionId) return;
    const cells = range.cells;
    if (!cells[key]) cells[key] = {};
    const cell = cells[key];
    if (e.altKey) {
      if (cell.outline === activeActionId) delete cell.outline; else cell.outline = activeActionId;
    } else if (e.shiftKey) {
      if (cell.fillSecondary === activeActionId) delete cell.fillSecondary; else cell.fillSecondary = activeActionId;
    } else {
      if (cell.fill === activeActionId) { delete cell.fill; delete cell.fillSecondary; }
      else { cell.fill = activeActionId; delete cell.fillSecondary; }
    }
    if (Object.keys(cell).length === 0) delete cells[key];
    render();
  }

  // ---- Scenario bars (one per active axis) ----
  function renderScenarioBars(cells) {
    const axes = activeAxes(cells);
    axes.forEach(axisKey => {
      const labels = library.scenarioLabels[axisKey] || SCENARIO_AXES[axisKey];
      const bar = document.createElement("div"); bar.className = "scenario-bar";
      const lbl = document.createElement("span"); lbl.className = "scn-lbl"; lbl.textContent = "Scénario :"; bar.appendChild(lbl);
      function seg(state, text, editableKey) {
        const b = document.createElement("button"); b.className = "scn-seg" + (scenarioState[axisKey] === state ? " active" : ""); b.textContent = text;
        b.addEventListener("click", () => { scenarioState[axisKey] = state; render(); });
        if (editableKey) { b.title = "Double-clic pour renommer"; b.addEventListener("dblclick", ev => { ev.preventDefault(); editScenarioLabel(axisKey, editableKey, b); }); }
        return b;
      }
      bar.appendChild(seg("both", "Les deux", null));
      bar.appendChild(seg("passive", labels.passive, "passive"));
      bar.appendChild(seg("aggressive", labels.aggressive, "aggressive"));
      boardAreaEl.appendChild(bar);
    });
  }
  function editScenarioLabel(axisKey, poleKey, btn) {
    const input = document.createElement("input"); input.className = "scn-seg-edit"; input.value = library.scenarioLabels[axisKey][poleKey];
    btn.replaceWith(input); input.focus(); input.select();
    let done = false;
    function finish(save) { if (done) return; done = true; if (save) library.scenarioLabels[axisKey][poleKey] = input.value.trim() || library.scenarioLabels[axisKey][poleKey]; render(); }
    input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); finish(true); } else if (e.key === "Escape") { e.preventDefault(); finish(false); } });
    input.addEventListener("blur", () => finish(true));
  }

  // ---- Actions panel ----
  function renderActionsPanel() {
    actionsPanelEl.innerHTML = "";
    const cat = selectedCategory();
    const heading = document.createElement("h2");
    heading.textContent = cat ? ("Actions — " + (cat.type === "defense" ? "Défense" : "Attaque") + (editMode ? "" : " (utilisées)")) : "Actions";
    actionsPanelEl.appendChild(heading);
    if (!cat) return;
    const actions = actionsFor(cat);
    if (activeActionId && !actions.some(a => a.id === activeActionId)) activeActionId = actions[0] ? actions[0].id : null;
    const range = currentRange();
    const percents = computePercents(range ? range.cells : {}, actions);

    actions.forEach(item => {
      // In read-only mode, hide actions that are not used in this range/view.
      if (!editMode && percents[item.id] <= 0.0001) return;
      const row = document.createElement("div");
      row.className = "action-row" + (editMode ? " pickable" : "") + (editMode && item.id === activeActionId ? " active" : "");
      if (editMode) {
        row.tabIndex = 0; row.setAttribute("role", "button");
        const pick = () => { activeActionId = item.id; renderActionsPanel(); };
        row.addEventListener("click", pick);
        row.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); } });
      }
      const sw = document.createElement("span"); sw.className = "swatch";
      if (item.style === "outline") { sw.style.background = "transparent"; sw.style.boxShadow = "inset 0 0 0 3px " + item.color; } else sw.style.background = item.color;
      const label = document.createElement("span"); label.className = "action-label"; label.textContent = item.label;
      const pct = document.createElement("span"); pct.className = "percent"; pct.textContent = percents[item.id].toFixed(2) + "%";
      row.appendChild(sw); row.appendChild(label); row.appendChild(pct);
      actionsPanelEl.appendChild(row);
    });
  }

  // ---- Export / Import ----
  function exportLibrary() {
    const blob = new Blob([JSON.stringify(library, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "poker-ranges.json";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }
  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const lib = normalizeLibrary(JSON.parse(reader.result));
        if (!lib) throw new Error("Format JSON non reconnu");
        library = lib;
        selectedCategoryId = null; selectedRangeId = null; scenarioState = { tightness: "both", iso: "both" }; openDropdown = null;
        initSelection(); render();
      } catch (err) { alert("Impossible de charger ce fichier : " + err.message); }
    };
    reader.readAsText(file); fileInput.value = "";
  });

  // ================= DRILL MODE =================
  function el(tag, cls, txt) { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }

  // Hand lattice: neighbours used to measure how many "crans" (rank-steps) a wrong answer is off.
  // Pairs connect to adjacent pairs (diagonal); suited stays in the upper triangle; offsuit lower.
  const RC_TO_KEY = {};
  HANDS.forEach(h => { RC_TO_KEY[h.row + "," + h.col] = h.key; });
  const NEIGHBORS = {};
  HANDS.forEach(h => {
    const i = h.row, j = h.col, res = [];
    const inb = v => v >= 0 && v <= 12;
    const push = (r, c) => { const k = RC_TO_KEY[r + "," + c]; if (k) res.push(k); };
    const cand = (i === j) ? [[i-1, j-1], [i+1, j+1]] : [[i-1, j], [i+1, j], [i, j-1], [i, j+1]];
    cand.forEach(rc => {
      const r = rc[0], c = rc[1];
      if (!inb(r) || !inb(c)) return;
      if (i === j) { if (r === c) push(r, c); }
      else if (i < j) { if (r < c) push(r, c); }
      else { if (r > c) push(r, c); }
    });
    NEIGHBORS[h.key] = res;
  });

  const FOLD_ID = "FOLD";
  const FOLD_ACTION = { id: FOLD_ID, label: "Fold", color: "#d9d9d9", style: "fill" };
  function drillActionById(id) { return id === FOLD_ID ? FOLD_ACTION : (actionById(id) || { id: id, label: id, color: "#888", style: "fill" }); }
  // In the "both" scenario a split accepts either of its two actions; an empty cell means Fold.
  // A triangle-only cell (fillSecondary without fill, used by the defense ranges) is a
  // fold-or-action conditional: the empty half IS Fold, so both answers are accepted.
  function correctAnswers(cell) {
    const out = [];
    if (cell && (cell.fill || cell.fillSecondary)) {
      out.push(cell.fill || FOLD_ID);
      if (cell.fillSecondary && cell.fillSecondary !== cell.fill) out.push(cell.fillSecondary);
    }
    return out.length ? out : [FOLD_ID];
  }
  function buildCorrectMap(cells) {
    const m = {}; HANDS.forEach(h => { m[h.key] = correctAnswers(cells[h.key]); }); return m;
  }

  // How far (in crans) the CHOSEN action is from a hand where it would be correct. 0 = exact.
  const DIST_CAP = 3;
  function offByDistance(correctMap, startKey, action) {
    if (correctMap[startKey].indexOf(action) >= 0) return { d: 0, at: startKey };
    const seen = {}; seen[startKey] = true;
    let frontier = [startKey];
    for (let depth = 1; depth <= DIST_CAP; depth++) {
      const next = [];
      for (let a = 0; a < frontier.length; a++) {
        const nbs = NEIGHBORS[frontier[a]];
        for (let b = 0; b < nbs.length; b++) {
          const nb = nbs[b];
          if (seen[nb]) continue;
          seen[nb] = true;
          if (correctMap[nb].indexOf(action) >= 0) return { d: depth, at: nb };
          next.push(nb);
        }
      }
      frontier = next;
    }
    return { d: Infinity, at: null };
  }
  function gradeAnswer(correctMap, handKey, chosen) {
    const res = offByDistance(correctMap, handKey, chosen);
    if (res.d === 0) return { band: "exact", q: 5, d: 0, at: res.at };
    if (res.d === 1) return { band: "near", q: 4, d: 1, at: res.at };
    if (res.d === 2) return { band: "borderline", q: 3, d: 2, at: res.at };
    return { band: "far", q: 1, d: res.d, at: res.at };
  }

  // ---- Stats store (separate from the range library) ----
  const STATS_KEY = "pokerRangeBuilder:stats";
  function loadStats() { try { const r = localStorage.getItem(STATS_KEY); if (r) { const p = JSON.parse(r); if (p && p.items) return p; } } catch (e) {} return { version: 1, items: {} }; }
  let stats = loadStats();
  function saveStats() { try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch (e) {} }
  function itemKey(catId, rangeId, handKey) { return catId + "/" + rangeId + "/" + handKey; }
  // SM-2 update; quality q from the grading band (5 exact, 4 near, 3 borderline, <=2 fail).
  function updateSM2(k, q) {
    const it = stats.items[k] || (stats.items[k] = { reps: 0, ease: 2.5, intervalDays: 0, due: 0, attempts: 0, correct: 0 });
    if (q < 3) { it.reps = 0; it.intervalDays = 0; }
    else {
      it.reps = (it.reps || 0) + 1;
      if (it.reps === 1) it.intervalDays = 1;
      else if (it.reps === 2) it.intervalDays = 3;
      else it.intervalDays = Math.max(1, Math.round((it.intervalDays || 1) * (it.ease || 2.5)));
    }
    const ef = (it.ease || 2.5) + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
    it.ease = Math.max(1.3, ef);
    it.due = Date.now() + (it.intervalDays || 0) * 86400000;
    it.attempts = (it.attempts || 0) + 1;
    if (q >= 3) it.correct = (it.correct || 0) + 1;
    it.lastSeen = Date.now();
    return it;
  }

  // ---- Session building ----
  // Drill pool for a range = action cells + empty cells adjacent to one (boundary folds).
  // Deep trivial folds (72o...) are skipped so sessions stay meaningful.
  function rangePoolHands(cells) {
    const has = {}; HANDS.forEach(h => { const c = cells[h.key]; if (c && (c.fill || c.fillSecondary)) has[h.key] = true; });
    const pool = {}; Object.keys(has).forEach(k => { pool[k] = true; });
    HANDS.forEach(h => {
      if (has[h.key]) return;
      if (NEIGHBORS[h.key].some(nb => has[nb])) pool[h.key] = true;
    });
    return Object.keys(pool);
  }
  function scopeUnitsRaw(scope) {
    const units = [];
    const add = (cat, r) => { if (r && r.cells) { const hands = rangePoolHands(r.cells); if (hands.length) units.push({ cat: cat, range: r, hands: hands }); } };
    if (scope === "position") { const c = selectedCategory(), r = currentRange(); if (c && r) add(c, r); }
    else if (scope === "category") { const c = selectedCategory(); if (c) c.ranges.forEach(r => add(c, r)); }
    else library.categories.forEach(c => c.ranges.forEach(r => add(c, r)));
    return units;
  }
  function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; } return a; }
  function buildSession(scope) {
    const units = scopeUnitsRaw(scope), now = Date.now();
    let items = [];
    units.forEach(u => {
      const cm = buildCorrectMap(u.range.cells);
      u.hands.forEach(hk => {
        const k = itemKey(u.cat.id, u.range.id, hk);
        const it = stats.items[k];
        items.push({ catId: u.cat.id, rangeId: u.range.id, handKey: hk, cat: u.cat, range: u.range, correctMap: cm, itemKey: k, due: it ? it.due : 0, seen: !!it });
      });
    });
    // Order: due first, then unseen (new), then not-yet-due; shuffled within each group (interleaving).
    const dueG = shuffle(items.filter(x => x.seen && x.due <= now));
    const newG = shuffle(items.filter(x => !x.seen));
    const laterG = shuffle(items.filter(x => x.seen && x.due > now));
    const ordered = scope === "due" ? dueG : dueG.concat(newG, laterG);
    return ordered.slice(0, scope === "due" ? 80 : 30);
  }
  function scopeStats(scope) {
    const units = scopeUnitsRaw(scope), now = Date.now();
    let total = 0, seen = 0, due = 0;
    units.forEach(u => u.hands.forEach(hk => {
      total++;
      const it = stats.items[itemKey(u.cat.id, u.range.id, hk)];
      if (it) { seen++; if (it.due <= now) due++; }
    }));
    return { total: total, seen: seen, due: due, ranges: units.length };
  }

  // ---- Drill state + control ----
  let drillOpen = false, drill = null, drillScope = "category";
  function openDrill() {
    drillOpen = true; drill = null;
    const cat = selectedCategory();
    drillScope = (cat && cat.ranges.length) ? "category" : "all";
    renderDrill();
  }
  function closeDrill() { drillOpen = false; drill = null; renderDrill(); }
  function startScopeSession(scope) {
    const q = buildSession(scope);
    if (!q.length) { alert(scope === "due" ? "Rien à réviser pour l'instant — reviens plus tard ou choisis une autre portée." : "Aucune main à driller dans cette portée."); return; }
    drill = { scope: scope, queue: q, pos: 0, answeredAt: null, tally: { asked: 0, exact: 0, near: 0, borderline: 0, far: 0 }, missed: [] };
    renderDrill();
  }
  function answerDrill(chosen) {
    if (!drill || drill.answeredAt) return;
    const q = drill.queue[drill.pos];
    const g = gradeAnswer(q.correctMap, q.handKey, chosen);
    drill.answeredAt = { chosen: chosen, grade: g };
    drill.tally.asked++; drill.tally[g.band]++;
    updateSM2(q.itemKey, g.q); saveStats();
    if (g.band === "far" || g.band === "borderline") drill.missed.push({ handKey: q.handKey, cat: q.cat });
    if (g.band === "far" && (q._requeues || 0) < 2) { // relearn within the session
      const nq = Object.assign({}, q); nq._requeues = (q._requeues || 0) + 1; nq.answeredAt = null;
      drill.queue.splice(Math.min(drill.queue.length, drill.pos + 6), 0, nq);
    }
    renderDrill();
  }
  function nextDrill() { if (!drill) return; drill.pos++; drill.answeredAt = null; renderDrill(); }

  function handDesc(key) {
    if (key.length === 2) return "Paire — 6 combos";
    return key[2] === "s" ? "Assorti — 4 combos" : "Dépareillé — 12 combos";
  }

  // ---- Drill rendering ----
  function renderDrill() {
    const root = document.getElementById("drillRoot");
    root.classList.toggle("on", drillOpen);
    root.innerHTML = "";
    if (!drillOpen) { document.body.style.overflow = ""; return; }
    document.body.style.overflow = "hidden";
    const wrap = el("div", "drill-wrap");
    const top = el("div", "drill-top");
    top.appendChild(el("div", "d-title", "🎯 Drill"));
    const prog = el("div", "d-progress");
    if (drill && drill.pos < drill.queue.length) prog.textContent = (drill.pos + 1) + " / " + drill.queue.length;
    top.appendChild(prog);
    top.appendChild(el("div", "d-spacer"));
    const close = el("button", "drill-close", "✕ Fermer"); close.addEventListener("click", closeDrill);
    top.appendChild(close);
    wrap.appendChild(top);
    if (!drill) wrap.appendChild(renderDrillConfig());
    else if (drill.pos >= drill.queue.length) wrap.appendChild(renderDrillSummary());
    else wrap.appendChild(renderDrillQuestion());
    root.appendChild(wrap);
  }

  function renderDrillConfig() {
    const c = el("div");
    const card = el("div", "d-card");
    card.appendChild(el("h3", "", "Choisis quoi réviser"));
    card.appendChild(el("p", "", "Le score tient compte de la précision : une main d'écart = « presque ». Les révisions sont programmées automatiquement (répétition espacée) ; termine en mélangé pour coller aux conditions réelles."));
    const cat = selectedCategory(), r = currentRange();
    const scopes = [
      { key: "position", name: "Position courante", sub: (cat && r) ? boardTitle(cat, r) : "—", enabled: !!(cat && r) },
      { key: "category", name: "Catégorie — positions mélangées", sub: cat ? cat.name : "—", enabled: !!(cat && cat.ranges.length),
        star: true, tip: "Le plus efficace : t'oblige à reconnaître puis distinguer chaque position, exactement comme à la table — là où le drill d'une seule position échoue." },
      { key: "all", name: "Tout mélangé", sub: "Toutes les catégories", enabled: true },
      { key: "due", name: "À réviser (répétition espacée)", sub: "Ce qui est dû maintenant", enabled: true, dueScope: true }
    ];
    const list = el("div", "d-scope");
    scopes.forEach(s => {
      const st = scopeStats(s.dueScope ? "all" : s.key);
      const btn = el("button", "d-scope-btn" + (drillScope === s.key ? " sel" : ""));
      if (!s.enabled) { btn.disabled = true; btn.style.opacity = 0.45; }
      const info = el("div");
      const nameRow = el("div", "d-scope-namerow");
      nameRow.appendChild(el("span", "d-scope-name", s.name));
      if (s.star) nameRow.appendChild(el("span", "d-scope-badge", "⭐ Recommandé"));
      info.appendChild(nameRow);
      info.appendChild(el("div", "d-scope-sub", s.sub));
      if (s.tip) info.appendChild(el("div", "d-scope-tip", s.tip));
      btn.appendChild(info);
      btn.appendChild(el("div", "d-scope-count", s.dueScope ? (st.due + " dues") : (st.total + " mains")));
      if (s.enabled) btn.addEventListener("click", () => { drillScope = s.key; renderDrill(); });
      list.appendChild(btn);
    });
    card.appendChild(list);
    const start = el("button", "d-start", "Commencer ▶");
    start.addEventListener("click", () => startScopeSession(drillScope));
    card.appendChild(start);
    c.appendChild(card);

    const card2 = el("div", "d-card");
    card2.appendChild(el("h3", "", "Progression"));
    const allst = scopeStats("all");
    card2.appendChild(el("p", "", allst.seen + " mains vues · " + allst.due + " dues · " + allst.total + " mains actives au total."));
    const acts = el("div", "d-mini-actions");
    const eb = el("button", null, "Exporter les stats"); eb.addEventListener("click", exportStats);
    const ib = el("button", null, "Importer les stats"); ib.addEventListener("click", importStatsFile);
    const rb = el("button", null, "Réinitialiser"); rb.addEventListener("click", resetStats);
    acts.appendChild(eb); acts.appendChild(ib); acts.appendChild(rb);
    card2.appendChild(acts);
    c.appendChild(card2);
    return c;
  }

  function renderDrillQuestion() {
    const q = drill.queue[drill.pos];
    const c = el("div");
    c.appendChild(el("div", "d-context", boardTitle(q.cat, q.range)));
    c.appendChild(el("div", "d-hand", q.handKey));
    c.appendChild(el("div", "d-hand-sub", handDesc(q.handKey)));
    const answers = actionsFor(q.cat).filter(a => a.style === "fill").concat([FOLD_ACTION]);
    const answered = drill.answeredAt;
    const correctSet = q.correctMap[q.handKey];
    const ans = el("div", "d-answers");
    answers.forEach((a, idx) => {
      const b = el("button", "d-ans");
      const sw = el("span", "d-sw"); sw.style.background = a.color; b.appendChild(sw);
      b.appendChild(el("span", null, a.label));
      b.appendChild(el("span", "d-kbd", String(idx + 1)));
      if (answered) {
        b.disabled = true;
        if (correctSet.indexOf(a.id) >= 0) b.classList.add("correct");
        else if (a.id === answered.chosen) b.classList.add("chosen-wrong");
        else b.classList.add("dim");
      } else {
        b.addEventListener("click", () => answerDrill(a.id));
      }
      ans.appendChild(b);
    });
    c.appendChild(ans);
    if (answered) {
      c.appendChild(renderFeedback(q, answered));
      c.appendChild(renderMiniGrid(q.range.cells, q.handKey));
      const isLast = drill.pos + 1 >= drill.queue.length;
      const next = el("button", "d-next", isLast ? "Voir le résultat ▶" : "Suivant ▶  (Entrée)");
      next.addEventListener("click", nextDrill);
      c.appendChild(next);
    } else {
      c.appendChild(el("div", "d-hand-sub", "Choisis l'action — ou tape son chiffre"));
    }
    return c;
  }

  function renderFeedback(q, answered) {
    const g = answered.grade;
    const fb = el("div", "d-feedback " + g.band);
    const correctLabels = q.correctMap[q.handKey].map(id => drillActionById(id).label).join(" ou ");
    const chosenLabel = drillActionById(answered.chosen).label;
    let msg;
    if (g.band === "exact") msg = "✓ Exact — " + q.handKey + " : " + correctLabels + ".";
    else if (g.band === "near") msg = "≈ Presque, 1 main d'écart — ici " + q.handKey + " = " + correctLabels + ". « " + chosenLabel + " » ne devient juste qu'à " + g.at + ".";
    else if (g.band === "borderline") msg = "~ Limite, 2 mains d'écart — " + q.handKey + " = " + correctLabels + ". « " + chosenLabel + " » serait juste à " + g.at + ".";
    else msg = "✗ Écarté — " + q.handKey + " = " + correctLabels + ", pas « " + chosenLabel + " »" + (g.at ? " (juste seulement à " + g.at + ")" : "") + ".";
    fb.textContent = msg;
    return fb;
  }

  function renderMiniGrid(cells, hlKey) {
    const g = el("div", "d-mini-grid");
    HANDS.forEach(h => {
      const cd = cells[h.key] || {};
      const cell = el("div", "d-mini-cell" + (h.key === hlKey ? " hl" : ""));
      const fillA = cd.fill ? actionById(cd.fill) : null;
      if (fillA) cell.style.background = fillA.color;
      if (cd.fillSecondary) { const s = actionById(cd.fillSecondary); if (s) { const tri = el("div", "d-mini-sec"); tri.style.background = s.color; cell.appendChild(tri); } }
      if (cd.outline && h.key !== hlKey) { const o = actionById(cd.outline); if (o) cell.style.boxShadow = "inset 0 0 0 2px " + o.color; }
      g.appendChild(cell);
    });
    return g;
  }

  function renderDrillSummary() {
    const c = el("div"), t = drill.tally;
    const pass = t.exact + t.near + t.borderline;
    const card = el("div", "d-card");
    card.appendChild(el("h3", "", "Séance terminée"));
    card.appendChild(el("p", "", "Précision : " + (t.asked ? Math.round(pass / t.asked * 100) : 0) + "% dans la tolérance (≤ 2 mains d'écart)."));
    function stat(label, val, color) { const row = el("div", "d-sum-stat"); row.appendChild(el("span", null, label)); const v = el("span", "v", String(val)); if (color) v.style.color = color; row.appendChild(v); card.appendChild(row); }
    stat("Questions", t.asked);
    stat("✓ Exact", t.exact, "#7ed48c");
    stat("≈ Presque (1 main)", t.near, "#cfd06a");
    stat("~ Limite (2 mains)", t.borderline, "#d9b45a");
    stat("✗ Écarté", t.far, "#e08a6a");
    c.appendChild(card);
    if (drill.missed.length) {
      const m = el("div", "d-card");
      m.appendChild(el("h3", "", "À retravailler"));
      const wrap = el("div", "d-missed"); const seen = {};
      drill.missed.forEach(x => { const key = x.handKey + "|" + x.cat.id; if (seen[key]) return; seen[key] = true; const chip = el("div", "chip", x.handKey); chip.title = boardTitle(x.cat, null); wrap.appendChild(chip); });
      m.appendChild(wrap); c.appendChild(m);
    }
    const acts = el("div", "d-mini-actions");
    const again = el("button", null, "Rejouer cette portée"); again.addEventListener("click", () => startScopeSession(drill.scope));
    const back = el("button", null, "Changer de portée"); back.addEventListener("click", () => { drill = null; renderDrill(); });
    const cl = el("button", null, "Fermer"); cl.addEventListener("click", closeDrill);
    acts.appendChild(again); acts.appendChild(back); acts.appendChild(cl);
    c.appendChild(acts);
    return c;
  }

  // ---- Stats export / import / reset ----
  function exportStats() {
    const blob = new Blob([JSON.stringify(stats, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "poker-drill-stats.json";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }
  function importStatsFile() {
    const inp = document.createElement("input"); inp.type = "file"; inp.accept = "application/json,.json";
    inp.addEventListener("change", () => {
      const f = inp.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        try {
          const parsed = JSON.parse(rd.result);
          if (!parsed || typeof parsed.items !== "object") throw new Error("format non reconnu");
          let n = 0;
          Object.keys(parsed.items).forEach(k => {
            const inc = parsed.items[k], cur = stats.items[k];
            if (!cur || (inc.lastSeen || 0) > (cur.lastSeen || 0)) { stats.items[k] = inc; n++; }
          });
          saveStats(); renderDrill();
          alert("Stats fusionnées (" + n + " entrées mises à jour).");
        } catch (e) { alert("Fichier stats invalide : " + e.message); }
      };
      rd.readAsText(f);
    });
    inp.click();
  }
  function resetStats() {
    if (!confirm("Effacer toutes les stats de drill ? Irréversible (sauf si tu as un export).")) return;
    stats = { version: 1, items: {} }; saveStats(); renderDrill();
  }

  document.addEventListener("keydown", e => {
    if (!drillOpen) return;
    if (e.key === "Escape") { e.preventDefault(); closeDrill(); return; }
    if (!drill || drill.pos >= drill.queue.length) return;
    if (drill.answeredAt) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); nextDrill(); } return; }
    const n = parseInt(e.key, 10);
    if (!isNaN(n) && n >= 1) {
      const q = drill.queue[drill.pos];
      const answers = actionsFor(q.cat).filter(a => a.style === "fill").concat([FOLD_ACTION]);
      if (n <= answers.length) { e.preventDefault(); answerDrill(answers[n - 1].id); }
    }
  });
  // =============== END DRILL MODE ===============

  // ================= PREFLOP LOG =================
  // Journal of real-table preflop decisions. Each entry is graded instantly with the
  // drill's tolerance grader against the current library; names are denormalized so
  // entries stay readable even if the library changes later.
  const LOGS_KEY = "pokerRangeBuilder:logs";
  function loadLogs() {
    try { const r = localStorage.getItem(LOGS_KEY); if (r) { const p = JSON.parse(r); if (p && Array.isArray(p.entries)) return p; } } catch (e) {}
    return { version: 1, entries: [], last: {} };
  }
  let plog = loadLogs();
  function saveLogs() { try { localStorage.setItem(LOGS_KEY, JSON.stringify(plog)); } catch (e) {} }

  const PRE_TAGS = [["fold", "Fold à moi"], ["limp", "1 limp"], ["multi", "Multi-limp"]];
  let logOpen = false, logTab = "compose";
  let logSel = { catId: null, coords: {}, hand: null, action: null, pre: null };
  let logLastEntry = null, logShowRange = false;

  function logCat() { return library.categories.find(c => c.id === logSel.catId) || null; }
  function logCats() { return library.categories.filter(c => c.type === "defense" || (c.ranges && c.ranges.length)); }
  function axisValues(cat, axis) {
    if (axis.values) return axis.values;
    const seen = [], out = [];
    cat.ranges.forEach(r => { const v = r.coords[axis.key]; if (v && seen.indexOf(v) < 0) { seen.push(v); out.push(v); } });
    return out;
  }
  function ensureLogCoords() {
    const cat = logCat(); if (!cat) return;
    const keys = [];
    axesFor(cat).forEach(a => {
      keys.push(a.key);
      const vals = axisValues(cat, a);
      if (!logSel.coords[a.key] || vals.indexOf(logSel.coords[a.key]) < 0) logSel.coords[a.key] = vals[0] || null;
    });
    Object.keys(logSel.coords).forEach(k => { if (keys.indexOf(k) < 0) delete logSel.coords[k]; });
  }
  function logCoordsTxt() {
    const cat = logCat(); if (!cat) return "";
    return axesFor(cat).map(a => logSel.coords[a.key]).filter(Boolean).join(" ");
  }

  function openLog() {
    logOpen = true; logTab = "compose"; logLastEntry = null; logShowRange = false;
    const last = plog.last || {};
    const cats = logCats();
    const cat = cats.find(c => c.id === last.catId) || (selectedCategory() && cats.find(c => c.id === selectedCategoryId)) || cats[0] || null;
    logSel = { catId: cat ? cat.id : null, coords: {}, hand: null, action: null, pre: null };
    if (cat && last.catId === cat.id && last.coords) logSel.coords = Object.assign({}, last.coords);
    ensureLogCoords(); renderLog();
  }
  function closeLog() { logOpen = false; renderLog(); }

  function logSave() {
    const cat = logCat(); if (!cat || !logSel.hand || !logSel.action) return;
    const range = coordsMatch(cat, logSel.coords);
    let verdict = null;
    if (range && Object.keys(range.cells || {}).length) {
      const cm = buildCorrectMap(range.cells);
      const g = gradeAnswer(cm, logSel.hand, logSel.action);
      verdict = { band: g.band, d: g.d === Infinity ? -1 : g.d, at: g.at, correct: cm[logSel.hand] };
    }
    const entry = {
      id: uid("l"), ts: Date.now(),
      catId: cat.id, catName: cat.name, catType: cat.type,
      coords: Object.assign({}, logSel.coords), coordsTxt: logCoordsTxt(),
      hand: logSel.hand, action: logSel.action, actionLabel: drillActionById(logSel.action).label,
      pre: logSel.pre, verdict: verdict
    };
    plog.entries.push(entry);
    plog.last = { catId: cat.id, coords: Object.assign({}, logSel.coords) };
    saveLogs();
    logLastEntry = entry; logShowRange = false;
    logSel.hand = null; logSel.action = null; logSel.pre = null;
    renderLog();
  }

  function logVerdictMsg(entry) {
    const v = entry.verdict;
    if (!v) return "⚠️ Pas de range peinte pour ce spot — enregistré sans verdict.";
    const correct = v.correct.map(id => drillActionById(id).label).join(" ou ");
    if (v.band === "exact") return "✓ Exact — " + entry.hand + " : " + correct + ".";
    if (v.band === "near") return "≈ Presque (1 main d'écart) — " + entry.hand + " = " + correct + ". « " + entry.actionLabel + " » ne devient juste qu'à " + v.at + ".";
    if (v.band === "borderline") return "~ Limite (2 mains) — " + entry.hand + " = " + correct + ". « " + entry.actionLabel + " » serait juste à " + v.at + ".";
    return "✗ Écarté — " + entry.hand + " = " + correct + ", pas « " + entry.actionLabel + " »" + (v.at ? " (juste seulement à " + v.at + ")" : "") + ".";
  }

  function renderLog() {
    const root = document.getElementById("logRoot");
    root.classList.toggle("on", logOpen);
    root.innerHTML = "";
    if (!logOpen) { if (!drillOpen) document.body.style.overflow = ""; return; }
    document.body.style.overflow = "hidden";
    const wrap = el("div", "drill-wrap");
    const top = el("div", "drill-top");
    top.appendChild(el("div", "d-title", "📓 Log preflop"));
    top.appendChild(el("div", "d-spacer"));
    const close = el("button", "drill-close", "✕ Fermer"); close.addEventListener("click", closeLog);
    top.appendChild(close);
    wrap.appendChild(top);

    const tabs = el("div", "lg-tabs");
    [["compose", "＋ Saisie"], ["journal", "Journal (" + plog.entries.length + ")"]].forEach(t => {
      const b = el("button", "lg-tab" + (logTab === t[0] ? " active" : ""), t[1]);
      b.addEventListener("click", () => { logTab = t[0]; renderLog(); });
      tabs.appendChild(b);
    });
    wrap.appendChild(tabs);

    wrap.appendChild(logTab === "compose" ? renderLogCompose() : renderLogJournal());
    root.appendChild(wrap);
  }

  function renderLogCompose() {
    const c = el("div");
    if (logLastEntry) {
      const v = logLastEntry.verdict;
      const fb = el("div", "d-feedback " + (v ? v.band : "borderline"));
      fb.textContent = logVerdictMsg(logLastEntry);
      c.appendChild(fb);
      const cat0 = library.categories.find(x => x.id === logLastEntry.catId);
      const range0 = cat0 && cat0.ranges.find(r => axesFor(cat0).every(a => r.coords[a.key] === logLastEntry.coords[a.key]));
      if (range0) {
        if (logShowRange) c.appendChild(renderMiniGrid(range0.cells, logLastEntry.hand));
        const rev = el("button", "lg-reveal", logShowRange ? "Masquer la range" : "Voir la range");
        rev.addEventListener("click", () => { logShowRange = !logShowRange; renderLog(); });
        c.appendChild(rev);
      }
    }
    const cat = logCat();
    c.appendChild(el("div", "lg-sec", "Catégorie de table"));
    const chips = el("div", "lg-chips");
    logCats().forEach(x => {
      const ch = el("button", "lg-chip" + (x.id === logSel.catId ? " sel" : ""), x.name);
      ch.addEventListener("click", () => { logSel.catId = x.id; logSel.coords = {}; logSel.action = null; ensureLogCoords(); renderLog(); });
      chips.appendChild(ch);
    });
    c.appendChild(chips);
    if (!cat) { c.appendChild(el("p", "d-hand-sub", "Aucune catégorie avec des ranges.")); return c; }

    axesFor(cat).forEach(a => {
      c.appendChild(el("div", "lg-sec", a.label));
      const row = el("div", "lg-chips");
      axisValues(cat, a).forEach(v => {
        const ch = el("button", "lg-chip" + (logSel.coords[a.key] === v ? " sel" : ""), v);
        ch.addEventListener("click", () => { logSel.coords[a.key] = v; renderLog(); });
        row.appendChild(ch);
      });
      c.appendChild(row);
    });

    if (cat.type === "attaque") {
      c.appendChild(el("div", "lg-sec", "Avant toi (optionnel)"));
      const row = el("div", "lg-chips");
      PRE_TAGS.forEach(t => {
        const ch = el("button", "lg-chip" + (logSel.pre === t[0] ? " sel" : ""), t[1]);
        ch.addEventListener("click", () => { logSel.pre = logSel.pre === t[0] ? null : t[0]; renderLog(); });
        row.appendChild(ch);
      });
      c.appendChild(row);
    }

    c.appendChild(el("div", "lg-sec", "Ta main"));
    const grid = el("div", "lg-grid");
    HANDS.forEach(h => {
      const cell = el("button", "lg-cell" + (h.row === h.col ? " pair" : "") + (logSel.hand === h.key ? " sel" : ""), h.key);
      cell.addEventListener("click", () => { logSel.hand = h.key; renderLog(); });
      grid.appendChild(cell);
    });
    c.appendChild(grid);

    c.appendChild(el("div", "lg-sec", "Ton action"));
    const ans = el("div", "d-answers");
    actionsFor(cat).filter(a => a.style === "fill").concat([FOLD_ACTION]).forEach(a => {
      const b = el("button", "d-ans" + (logSel.action === a.id ? " sel" : ""));
      const sw = el("span", "d-sw"); sw.style.background = a.color; b.appendChild(sw);
      b.appendChild(el("span", null, a.label));
      b.addEventListener("click", () => { logSel.action = a.id; renderLog(); });
      ans.appendChild(b);
    });
    c.appendChild(ans);

    const save = el("button", "lg-save", "Enregistrer ✓");
    save.disabled = !(logSel.hand && logSel.action);
    save.addEventListener("click", logSave);
    c.appendChild(save);
    return c;
  }

  function renderLogJournal() {
    const c = el("div");
    if (!plog.entries.length) {
      c.appendChild(el("p", "d-hand-sub", "Aucune entrée pour l'instant. Logge tes actions depuis l'onglet Saisie."));
      return c;
    }
    const sorted = plog.entries.slice().sort((a, b) => b.ts - a.ts);
    // today's mini-recap
    const dayKey = ts => new Date(ts).toLocaleDateString("fr-FR");
    const today = dayKey(Date.now());
    const todays = sorted.filter(e => dayKey(e.ts) === today && e.verdict);
    if (todays.length) {
      const inTol = todays.filter(e => e.verdict.band !== "far").length;
      const far = todays.length - inTol;
      const card = el("div", "d-card");
      card.appendChild(el("h3", null, "Aujourd'hui"));
      card.appendChild(el("p", null, todays.length + " actions loggées · " + Math.round(inTol / todays.length * 100) + "% dans la tolérance · " + far + " écartée(s)."));
      c.appendChild(card);
    }
    let curDay = null;
    sorted.forEach(e => {
      const d = dayKey(e.ts);
      if (d !== curDay) { curDay = d; c.appendChild(el("div", "lg-day", d === today ? "Aujourd'hui" : d)); }
      const row = el("div", "lg-entry");
      const band = e.verdict ? e.verdict.band : "none";
      const badgeTxt = { exact: "✓", near: "≈", borderline: "~", far: "✗", none: "—" }[band];
      row.appendChild(el("span", "lg-badge " + band, badgeTxt));
      row.appendChild(el("span", "lg-hand", e.hand));
      const info = el("span", "lg-info");
      const preTxt = e.pre ? (" · " + (PRE_TAGS.find(t => t[0] === e.pre) || ["", e.pre])[1]) : "";
      info.textContent = e.actionLabel + " · " + e.coordsTxt + preTxt;
      const meta = el("span", "lg-meta"); meta.textContent = " — " + e.catName;
      info.appendChild(meta);
      row.appendChild(info);
      const time = el("span", "lg-meta", new Date(e.ts).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }));
      row.appendChild(time);
      const del = el("button", "lg-del", "×"); del.title = "Supprimer cette entrée";
      del.addEventListener("click", () => { plog.entries = plog.entries.filter(x => x.id !== e.id); saveLogs(); renderLog(); });
      row.appendChild(del);
      c.appendChild(row);
    });
    const acts = el("div", "d-mini-actions"); acts.style.marginTop = "16px";
    const eb = el("button", null, "Exporter le journal"); eb.addEventListener("click", exportLogs);
    const ib = el("button", null, "Importer"); ib.addEventListener("click", importLogsFile);
    const rb = el("button", null, "Tout effacer"); rb.addEventListener("click", () => {
      if (!confirm("Effacer tout le journal preflop ? Irréversible (sauf si tu as un export).")) return;
      plog.entries = []; saveLogs(); renderLog();
    });
    acts.appendChild(eb); acts.appendChild(ib); acts.appendChild(rb);
    c.appendChild(acts);
    return c;
  }

  function exportLogs() {
    const blob = new Blob([JSON.stringify(plog, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "poker-preflop-log.json";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }
  function importLogsFile() {
    const inp = document.createElement("input"); inp.type = "file"; inp.accept = "application/json,.json";
    inp.addEventListener("change", () => {
      const f = inp.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        try {
          const parsed = JSON.parse(rd.result);
          if (!parsed || !Array.isArray(parsed.entries)) throw new Error("format non reconnu");
          let n = 0;
          parsed.entries.forEach(e => { if (e && e.id && !plog.entries.some(x => x.id === e.id)) { plog.entries.push(e); n++; } });
          saveLogs(); renderLog();
          alert("Journal fusionné (" + n + " entrées ajoutées).");
        } catch (err) { alert("Fichier journal invalide : " + err.message); }
      };
      rd.readAsText(f);
    });
    inp.click();
  }

  document.addEventListener("keydown", e => {
    if (logOpen && e.key === "Escape") { e.preventDefault(); closeLog(); }
  });
  // =============== END PREFLOP LOG ===============

  // ---- Boot ----
  initSelection();
  render();
})();
</script>
</body>
</html>
